version: '3.8'

services:
  mysql-db:
    image: mysql:latest
    container_name: zrp-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234  # 원하는 루트 비밀번호로 변경하세요
      TZ: Asia/Seoul                      # 한국 시간대 설정
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: